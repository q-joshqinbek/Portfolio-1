<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vazifalar Menejeri — To-Do</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
<style>
  :root {
    --bg: #f0ebe3;
    --surface: #faf8f4;
    --card: #ffffff;
    --border: #e8e1d6;
    --text: #2d2d2d;
    --muted: #9a9585;
    --accent: #ff6b35;
    --accent-light: rgba(255,107,53,.12);
    --done-color: #4caf7d;
    --done-bg: rgba(76,175,125,.1);
    --shadow: 0 2px 12px rgba(0,0,0,.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Plus Jakarta Sans', sans-serif;
    min-height:100vh;
  }
  /* TEXTURE */
  body::before {
    content:''; position:fixed; inset:0; z-index:0;
    background-image: radial-gradient(circle at 20% 20%, rgba(255,107,53,.06) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(255,200,100,.07) 0%, transparent 50%);
    pointer-events:none;
  }

  .app { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:3rem 1.5rem; }

  /* HEADER */
  .app-header { margin-bottom:2.5rem; }
  .app-date {
    font-size:.75rem; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); margin-bottom:.5rem;
  }
  .app-title {
    font-size:2rem; font-weight:800; color:var(--text);
    letter-spacing:-.04em;
  }
  .app-title span { color:var(--accent); }

  /* PROGRESS */
  .progress-section { background:var(--card); border-radius:12px; padding:1.2rem 1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow); }
  .progress-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:.8rem; }
  .progress-label { font-size:.85rem; font-weight:600; }
  .progress-nums { font-size:.85rem; color:var(--muted); }
  .progress-track { background:var(--border); height:6px; border-radius:3px; overflow:hidden; }
  .progress-fill {
    height:100%; border-radius:3px;
    background:linear-gradient(90deg, var(--accent), #ff9a5c);
    transition:width .5s cubic-bezier(.4,0,.2,1);
  }
  .quick-stats { display:flex; gap:1.5rem; margin-top:1rem; }
  .qs { font-size:.78rem; }
  .qs-num { font-weight:700; font-size:1rem; }
  .qs-total { color:var(--text); }
  .qs-done { color:var(--done-color); }
  .qs-pending { color:var(--accent); }

  /* ADD FORM */
  .add-form {
    background:var(--card); border-radius:12px; padding:1.2rem 1.5rem;
    margin-bottom:1.5rem; box-shadow:var(--shadow);
  }
  .add-row { display:flex; gap:.8rem; margin-bottom:.8rem; }
  .add-input {
    flex:1; background:var(--bg); border:2px solid var(--border);
    padding:.7rem 1rem; border-radius:8px;
    font-family:'Plus Jakarta Sans',sans-serif; font-size:.95rem; color:var(--text);
    outline:none; transition:border-color .25s;
  }
  .add-input:focus { border-color:var(--accent); }
  .add-btn {
    background:var(--accent); color:#fff; border:none;
    padding:.7rem 1.4rem; border-radius:8px; cursor:pointer;
    font-family:'Plus Jakarta Sans',sans-serif; font-size:.9rem; font-weight:700;
    transition:transform .2s, box-shadow .2s; white-space:nowrap;
  }
  .add-btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(255,107,53,.35); }
  .add-meta { display:flex; gap:.8rem; flex-wrap:wrap; }
  .meta-select, .priority-select {
    background:var(--bg); border:1.5px solid var(--border);
    padding:.45rem .8rem; border-radius:6px;
    font-family:'Plus Jakarta Sans',sans-serif; font-size:.8rem; color:var(--text);
    outline:none; cursor:pointer;
  }

  /* FILTERS */
  .filter-row {
    display:flex; gap:.5rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center;
  }
  .tab-btn {
    padding:.45rem 1rem; border-radius:20px; border:1.5px solid var(--border);
    background:transparent; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;
    font-size:.8rem; font-weight:600; color:var(--muted); transition:all .25s;
  }
  .tab-btn:hover { border-color:var(--accent); color:var(--accent); }
  .tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .clear-btn {
    margin-left:auto; padding:.45rem 1rem; border-radius:20px;
    border:1.5px solid var(--border); background:transparent;
    cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;
    font-size:.78rem; color:var(--muted); transition:all .25s;
  }
  .clear-btn:hover { border-color:#ff4444; color:#ff4444; }

  /* TASKS LIST */
  .tasks-container { }
  .category-group { margin-bottom:1.5rem; }
  .category-label {
    font-size:.72rem; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); margin-bottom:.6rem; font-weight:600;
  }
  .tasks-list { list-style:none; }

  /* TASK ITEM */
  .task-item {
    background:var(--card); border-radius:10px;
    margin-bottom:.5rem; box-shadow:var(--shadow);
    border:1.5px solid transparent;
    display:flex; align-items:center; gap:.9rem;
    padding:.85rem 1rem; cursor:grab;
    transition:border-color .25s, box-shadow .25s, opacity .25s;
    position:relative; overflow:hidden;
  }
  .task-item:hover { border-color:var(--border); box-shadow:var(--shadow-lg); }
  .task-item.done { background:#fafff9; }
  .task-item.done .task-text { text-decoration:line-through; color:var(--muted); }
  .task-item.ui-sortable-helper {
    box-shadow:var(--shadow-lg); transform:rotate(1.5deg); border-color:var(--accent);
    cursor:grabbing;
  }
  .task-item.ui-sortable-placeholder {
    background:var(--accent-light); border:2px dashed var(--accent);
    border-radius:10px; visibility:visible !important;
  }

  .drag-handle {
    color:var(--border); font-size:1rem; cursor:grab; flex-shrink:0;
    transition:color .2s;
  }
  .task-item:hover .drag-handle { color:var(--muted); }

  .check-btn {
    width:22px; height:22px; border-radius:50%;
    border:2px solid var(--border); background:transparent;
    cursor:pointer; flex-shrink:0; position:relative;
    transition:border-color .25s, background .25s;
    display:flex; align-items:center; justify-content:center;
  }
  .check-btn:hover { border-color:var(--done-color); }
  .task-item.done .check-btn { background:var(--done-color); border-color:var(--done-color); }
  .check-btn::after { content:''; display:none; width:5px; height:9px; border:2px solid #fff; border-top:none; border-left:none; transform:rotate(45deg) translateY(-1px); }
  .task-item.done .check-btn::after { display:block; }

  .task-body { flex:1; min-width:0; }
  .task-text { font-size:.95rem; font-weight:500; }
  .task-meta { display:flex; gap:.5rem; margin-top:.2rem; align-items:center; }
  .task-cat {
    font-size:.7rem; padding:.1rem .5rem; border-radius:3px;
    font-weight:600; text-transform:uppercase; letter-spacing:.05em;
  }
  .cat-ish { background:rgba(255,107,53,.12); color:var(--accent); }
  .cat-shaxsiy { background:rgba(76,175,125,.12); color:var(--done-color); }
  .cat-oqish { background:rgba(100,120,255,.12); color:#6478ff; }
  .cat-other { background:var(--border); color:var(--muted); }
  .task-date { font-size:.72rem; color:var(--muted); }

  .priority-dot {
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
  }
  .p-high { background:#ff4444; }
  .p-medium { background:#ffaa00; }
  .p-low { background:#4caf7d; }

  .delete-btn {
    background:none; border:none; cursor:pointer; color:var(--border);
    font-size:1rem; padding:.2rem; border-radius:4px;
    transition:color .2s, background .2s; flex-shrink:0;
  }
  .delete-btn:hover { color:#ff4444; background:rgba(255,68,68,.1); }

  .empty-state {
    text-align:center; padding:3rem 2rem;
    color:var(--muted); font-size:.9rem;
    background:var(--card); border-radius:12px;
    box-shadow:var(--shadow);
  }
  .empty-icon { font-size:2.5rem; margin-bottom:.8rem; }

  /* TOAST */
  .toast {
    position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px);
    background:#2d2d2d; color:#fff; padding:.7rem 1.5rem;
    border-radius:20px; font-size:.85rem; font-weight:500;
    opacity:0; transition:opacity .3s, transform .3s; z-index:1000;
    pointer-events:none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

  <a href="projects.html"
    style="position:fixed; top:20px; left:20px; z-index:99; background:rgba(255,255,255,.15); backdrop-filter:blur(10px); color:black; padding:8px 16px; border-radius:20px; text-decoration:none; font-size:0.8rem; font-weight:600; border:1px solid rgba(255,255,255,.2); transition:0.3s;">
    ← Loyihalarga qaytish
  </a>

<div class="app">
  <div class="app-header">
    <div class="app-date" id="todayDate"></div>
    <div class="app-title">Mening <span>Vazifalarim</span></div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="progress-row">
      <span class="progress-label">Bugungi natija</span>
      <span class="progress-nums" id="progressText">0 / 0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="quick-stats">
      <div class="qs"><span class="qs-num qs-total" id="totalCount">0</span> <span style="color:var(--muted);font-size:.75rem">jami</span></div>
      <div class="qs"><span class="qs-num qs-done" id="doneCount">0</span> <span style="color:var(--muted);font-size:.75rem">bajarildi</span></div>
      <div class="qs"><span class="qs-num qs-pending" id="pendingCount">0</span> <span style="color:var(--muted);font-size:.75rem">qoldi</span></div>
    </div>
  </div>

  <!-- ADD FORM -->
  <div class="add-form">
    <div class="add-row">
      <input class="add-input" type="text" id="taskInput" placeholder="Yangi vazifa qo'shing...">
      <button class="add-btn" id="addBtn">+ Qo'sh</button>
    </div>
    <div class="add-meta">
      <select class="meta-select" id="catSelect">
        <option value="Ish">💼 Ish</option>
        <option value="Shaxsiy">🏠 Shaxsiy</option>
        <option value="Oqish">📚 O'qish</option>
        <option value="Other">📌 Boshqa</option>
      </select>
      <select class="meta-select" id="prioritySelect">
        <option value="medium">🟡 O'rta</option>
        <option value="high">🔴 Yuqori</option>
        <option value="low">🟢 Past</option>
      </select>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-row">
    <button class="tab-btn active" data-tab="all">Hammasi</button>
    <button class="tab-btn" data-tab="active">Faol</button>
    <button class="tab-btn" data-tab="done">Bajarilgan</button>
    <button class="clear-btn" id="clearDone">Bajarilganlarni o'chirish</button>
  </div>

  <!-- TASKS -->
  <div class="tasks-container">
    <ul class="tasks-list" id="tasksList"></ul>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">🎯</div>
      <div>Hech qanday vazifa yo'q.<br>Yuqoridagi qatorga qo'shing!</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tasks = JSON.parse(localStorage.getItem('tasks_uz') || '[]');
let currentTab = 'all';

function saveTasks(){ localStorage.setItem('tasks_uz', JSON.stringify(tasks)); }

function showToast(msg){
  const t = $('#toast');
  t.text(msg).addClass('show');
  setTimeout(()=> t.removeClass('show'), 2200);
}

function getCatClass(cat){
  return ({Ish:'cat-ish', Shaxsiy:'cat-shaxsiy', Oqish:'cat-oqish'}[cat]||'cat-other');
}

function renderTasks(){
  const list = $('#tasksList');
  list.empty();

  let visible = tasks.filter(t => {
    if(currentTab === 'active') return !t.done;
    if(currentTab === 'done') return t.done;
    return true;
  });

  if(visible.length === 0){
    $('#emptyState').show();
  } else {
    $('#emptyState').hide();
    visible.forEach(task => {
      const item = $(`
        <li class="task-item ${task.done?'done':''}" data-id="${task.id}">
          <span class="drag-handle">⠿</span>
          <button class="check-btn check" title="Bajarildi"></button>
          <div class="task-body">
            <div class="task-text">${task.text}</div>
            <div class="task-meta">
              <span class="task-cat ${getCatClass(task.cat)}">${task.cat}</span>
              <span class="task-date">${task.date}</span>
            </div>
          </div>
          <span class="priority-dot p-${task.priority}" title="${task.priority}"></span>
          <button class="delete-btn del" title="O'chirish">✕</button>
        </li>
      `);
      list.append(item);
    });
  }

  // Drag and drop
  list.sortable({
    handle:'.drag-handle',
    placeholder:'task-item ui-sortable-placeholder',
    tolerance:'pointer',
    update: function(){
      const newOrder = [];
      list.find('.task-item').each(function(){
        const id = $(this).data('id');
        const task = tasks.find(t => t.id == id);
        if(task) newOrder.push(task);
      });
      // Merge non-visible tasks back
      tasks.filter(t => {
        if(currentTab==='active') return t.done;
        if(currentTab==='done') return !t.done;
        return false;
      }).forEach(t => newOrder.push(t));
      tasks = newOrder;
      saveTasks();
    }
  });

  updateStats();
}

function updateStats(){
  const total = tasks.length;
  const done = tasks.filter(t=>t.done).length;
  const pending = total - done;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  $('#progressText').text(`${done} / ${total}`);
  $('#progressFill').css('width', pct+'%');
  $('#totalCount').text(total);
  $('#doneCount').text(done);
  $('#pendingCount').text(pending);
}

function addTask(){
  const text = $('#taskInput').val().trim();
  if(!text) return;
  const now = new Date();
  const dateStr = now.toLocaleDateString('uz-UZ', {day:'numeric', month:'short'});
  tasks.unshift({
    id: Date.now(),
    text,
    cat: $('#catSelect').val(),
    priority: $('#prioritySelect').val(),
    done: false,
    date: dateStr
  });
  $('#taskInput').val('');
  saveTasks();
  renderTasks();
  showToast('✅ Vazifa qo\'shildi!');
}

// Event delegation
$(document).on('click', '.check', function(){
  const id = $(this).closest('.task-item').data('id');
  const task = tasks.find(t => t.id == id);
  if(task){
    task.done = !task.done;
    saveTasks();
    renderTasks();
    showToast(task.done ? '🎉 Bajarildi!' : '↩ Qaytarildi');
  }
});

$(document).on('click', '.del', function(){
  const id = $(this).closest('.task-item').data('id');
  const task = tasks.find(t => t.id == id);
  tasks = tasks.filter(t => t.id != id);
  saveTasks();
  renderTasks();
  showToast(`🗑️ "${task?.text.substring(0,20)}..." o'chirildi`);
});

$('#addBtn').click(addTask);
$('#taskInput').keypress(e => { if(e.key==='Enter') addTask(); });

$('.tab-btn').click(function(){
  $('.tab-btn').removeClass('active');
  $(this).addClass('active');
  currentTab = $(this).data('tab');
  renderTasks();
});

$('#clearDone').click(function(){
  const cnt = tasks.filter(t=>t.done).length;
  if(cnt === 0){ showToast('Bajarilgan vazifalar yo\'q'); return; }
  tasks = tasks.filter(t=>!t.done);
  saveTasks();
  renderTasks();
  showToast(`🗑️ ${cnt} ta bajarilgan o'chirildi`);
});

// Date
const days = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
const months = ['yanvar','fevral','mart','aprel','may','iyun','iyul','avgust','sentabr','oktabr','noyabr','dekabr'];
const now = new Date();
$('#todayDate').text(`${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`);

// Sample data
if(tasks.length === 0){
  tasks = [
    { id:1, text:"Portfolio saytini tugatish", cat:"Ish", priority:"high", done:false, date:"3 yan" },
    { id:2, text:"jQuery animatsiyalarni o'rganish", cat:"Oqish", priority:"medium", done:true, date:"2 yan" },
    { id:3, text:"GitHub'ga kodni yuklash", cat:"Ish", priority:"medium", done:false, date:"3 yan" },
    { id:4, text:"Tushlik uchun mahsulot sotib olish", cat:"Shaxsiy", priority:"low", done:false, date:"3 yan" },
  ];
  saveTasks();
}

renderTasks();
</script>
</body>
</html>
