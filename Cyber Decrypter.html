<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQ Portfolio - Cyber City</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-orange: #ff5500;
            --neon-blue: #00f2ff;
            --neon-green: #00ff66;
            --dark-core: #05050a;
        }

        * {
            box-sizing: border-box;
            cursor: none !important;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-core);
            color: var(--neon-orange);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ─── KIBERPANK MAXSUS KURSOR ─── */
        .cyber-cursor-dot {
            width: 6px;
            height: 6px;
            background-color: var(--neon-orange);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 10px var(--neon-orange);
        }

        .cyber-cursor-circle {
            width: 30px;
            height: 30px;
            border: 1.5px solid rgba(255, 85, 0, 0.5);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease-out;
        }

        .cyber-cursor-hover-dot {
            background-color: var(--neon-green) !important;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .cyber-cursor-hover-circle {
            border-color: var(--neon-green) !important;
            width: 40px;
            height: 40px;
            border-style: double;
            animation: rotateRadar 3s infinite linear;
        }

        /* Top Bar */
        .top-cyber-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(255, 85, 0, 0.02);
            border-bottom: 2px dashed var(--neon-orange);
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.1);
            z-index: 10;
        }

        .back-hub-btn {
            color: #000;
            background: var(--neon-orange);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            padding: 8px 20px;
            font-size: 0.85rem;
            clip-path: polygon(0 0, 90% 0, 100% 50%, 90% 100%, 0 100%);
            box-shadow: 0 0 15px var(--neon-orange);
            transition: 0.3s;
        }

        .back-hub-btn:hover {
            background: transparent;
            color: var(--neon-orange);
            border: 1px solid var(--neon-orange);
            box-shadow: 0 0 25px var(--neon-orange);
        }

        /* 3D Canvas va Hud */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hud-overlay {
            position: absolute;
            top: 100px;
            right: 30px;
            background: rgba(5, 5, 10, 0.85);
            border: 1px solid var(--neon-blue);
            padding: 15px;
            z-index: 5;
            font-size: 0.85rem;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .control-panel {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 5;
        }

        .cyber-btn {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .cyber-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        @keyframes rotateRadar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="cyber-cursor-dot" id="cursorDot"></div>
    <div class="cyber-cursor-circle" id="cursorCircle"></div>

    <div class="top-cyber-bar">
        <a href="index.html" class="back-hub-btn">◀ BACK TO HUB</a>
        <div style="font-family: 'Orbitron'; letter-spacing: 2px; text-shadow: 0 0 8px var(--neon-orange);">CYBER CITY ARCHITECTURE</div>
        <div id="clock" style="color: var(--neon-orange)">00:00:00</div>
    </div>

    <canvas id="cityCanvas"></canvas>

    <div class="hud-overlay">
        <div style="color: var(--neon-blue); margin-bottom: 5px;">> CAMERA_MODE: MOUSE_LOCK</div>
        <div id="city-stats">BUILDINGS: GENERATING...</div>
    </div>

    <div class="control-panel">
        <button class="cyber-btn" onclick="generateNewCity()">SHAHARNI QAYTA GENERATSIYA QILISH</button>
    </div>

    <script>
        // Kursor scripti
        const cursorDot = document.getElementById('cursorDot');
        const cursorCircle = document.getElementById('cursorCircle');
        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
            cursorCircle.style.left = e.clientX + 'px';
            cursorCircle.style.top = e.clientY + 'px';
            
            // Kamera burchagi uchun qiymatlar
            mouseX = (e.clientX - window.innerWidth / 2) / 100;
            mouseY = (e.clientY - window.innerHeight / 2) / 100;
        });

        document.querySelectorAll('a, button').forEach(elem => {
            elem.addEventListener('mouseenter', () => {
                cursorDot.classList.add('cyber-cursor-hover-dot');
                cursorCircle.classList.add('cyber-cursor-hover-circle');
            });
            elem.addEventListener('mouseleave', () => {
                cursorDot.classList.remove('cyber-cursor-hover-dot');
                cursorCircle.classList.remove('cyber-cursor-hover-circle');
            });
        });

        // Soat
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ─── CYBER CITY GENERATOR ENGINE ───
        const canvas = document.getElementById('cityCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let buildings = [];
        const colors = ['#ff5500', '#00f2ff', '#ff0055', '#00ff66'];

        class Building {
            constructor(x, z, w, h, d, color) {
                this.x = x; // Shahar maydonidagi X o'qi
                this.z = z; // Chuqurlik (Z o'qi)
                this.w = w; // Eni
                this.h = 0; // Balandlik (0 dan o'sib boradi)
                this.targetH = h; // Yakuniy balandlik
                this.d = d; // Qalinligi
                this.color = color;
                this.growSpeed = Math.random() * 2 + 2;
            }

            draw() {
                if (this.h < this.targetH) this.h += this.growSpeed;

                // 3D Proyeksiya formulalari (Perspektiva effekti uchun)
                let scale = 400 / (400 + this.z + mouseX * 5); 
                let projX = canvas.width / 2 + (this.x - mouseX * 50) * scale;
                let projY = canvas.height / 2 + (150 - mouseY * 30) * scale;
                let projW = this.w * scale;
                let projH = this.h * scale;

                // Bino korpusi
                ctx.fillStyle = 'rgba(5, 5, 15, 0.85)';
                ctx.fillRect(projX - projW / 2, projY - projH, projW, projH);

                // Neon kontur (Glitch effekti bilan)
                ctx.strokeStyle = this.color;
                ctx.lineWidth = Math.random() > 0.98 ? 3 : 1; // Tasodifiy glitch qalinlashuvi
                ctx.strokeRect(projX - projW / 2, projY - projH, projW, projH);

                // Oynalar (Neon nuqtalar)
                ctx.fillStyle = this.color;
                for (let row = 1; row < projH / 10; row++) {
                    for (let col = 1; col < projW / 8; col++) {
                        if (Math.random() > 0.3) { // Ayrim chiroqlar o'chib yonadi
                            ctx.fillRect((projX - projW / 2) + col * 8, (projY - projH) + row * 10, 2, 2);
                        }
                    }
                }
            }
        }

        function generateNewCity() {
            buildings = [];
            let count = 60;
            document.getElementById('city-stats').innerText = `BUILDINGS: ${count} / MATRIX_GRID`;
            
            for (let i = 0; i < count; i++) {
                let x = (Math.random() - 0.5) * 800;
                let z = Math.random() * 600 + 100;
                let w = Math.random() * 40 + 20;
                let h = Math.random() * 250 + 100;
                let color = colors[Math.floor(Math.random() * colors.length)];
                
                buildings.push(new Building(x, z, w, h, w, color));
            }
            // Binolarni orqa fondan oldinga qarab tartiblaymiz (Z-index simulyatsiyasi)
            buildings.sort((a, b) => b.z - a.z);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Kiberpank quyuq foni har safar tozalab turiladi
            ctx.fillStyle = 'rgba(5, 5, 10, 0.3)'; // Biroz iz qoldirish effekti (motion blur)
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Shahar ufq chizig'i tarmog'i
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2 + 150);
            ctx.lineTo(canvas.width, canvas.height / 2 + 150);
            ctx.stroke();

            // Binolarni chizish
            buildings.forEach(b => b.draw());
        }

        generateNewCity();
        animate();
    </script>
</body>

</html>
