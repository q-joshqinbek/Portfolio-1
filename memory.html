<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Memory | JQ Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #050b14;
            cursor: none; /* Standart kursor yo'q */
        }
        a, button, .card {
            cursor: none;
        }
        .cyber-font {
            font-family: 'Orbitron', sans-serif;
        }
        /* NEON SICHQONCHA EFFECTI */
        #custom-cursor {
            width: 12px;
            height: 12px;
            background: #00f2ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px #00f2ff, 0 0 30px #00f2ff;
            transform: translate(-50%, -50%);
            transition: background 0.2s, transform 0.2s;
        }
        /* KARTANING AYLANISH EFFEKTI */
        .card {
            perspective: 1000px;
            height: 90px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.4s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Kartaning yopiq holati */
        .card-front {
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #38bdf8;
            box-shadow: inset 0 0 10px rgba(56, 189, 248, 0.2);
        }
        /* Kartaning ochiq holati */
        .card-back {
            background: rgba(236, 72, 153, 0.1);
            border: 2px solid #ec4899;
            transform: rotateY(180deg);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.3);
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen flex flex-col justify-between relative select-none overflow-hidden">

    <div id="custom-cursor"></div>

    <div class="max-w-xl w-full mx-auto px-6 pt-6 relative z-10">
        <a href="index.html" class="hover-target inline-flex items-center gap-2 text-xs font-bold text-sky-400 bg-slate-900/80 border border-sky-500/20 rounded-xl px-4 py-2.5 transition-all hover:border-sky-400 backdrop-blur-sm">
            <i class="fa-solid fa-chevron-left"></i> ORQAGA
        </a>
    </div>

    <main class="max-w-md w-full mx-auto px-6 py-4 flex-grow flex flex-col justify-center relative z-10">
        
        <div class="text-center mb-4">
            <h1 class="text-2xl font-black text-white cyber-font tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500">
                CYBER MEMORY
            </h1>
            <p class="text-xs text-slate-400 mt-1">Bir xil neon piktogrammalarni juftlab toping!</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4 text-center">
            <div class="bg-slate-900/60 border border-slate-800 p-2.5 rounded-xl">
                <span class="text-[10px] text-slate-500 uppercase font-bold cyber-font block">Urinishlar</span>
                <span id="flips" class="text-lg font-bold text-cyan-400 cyber-font">0</span>
            </div>
            <div class="bg-slate-900/60 border border-slate-800 p-2.5 rounded-xl">
                <span class="text-[10px] text-slate-500 uppercase font-bold cyber-font block">Topildi</span>
                <span id="score" class="text-lg font-bold text-pink-500 cyber-font">0 / 6</span>
            </div>
        </div>

        <div id="game-grid" class="grid grid-cols-4 gap-3 bg-slate-900/30 border border-slate-800/80 p-4 rounded-2xl backdrop-blur-md">
            </div>

        <button id="restart-btn" class="hover-target mt-4 w-full bg-slate-800 hover:bg-slate-700/80 border border-slate-700 text-slate-300 font-bold py-3 rounded-xl transition-all text-xs uppercase tracking-wider cyber-font">
            O'yinni qayta boshlash
        </button>
    </main>

    <footer class="py-4 text-center text-[10px] text-slate-600 cyber-font">
        &copy; 2026 JQ Portfolio. Neon Brain Trainer.
    </footer>

    <script>
        // SICHQONCHA KURSORI HAREKETI
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Kursor elementlar ustiga kelganda reaksiyasi
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('.hover-target') || e.target.closest('.card')) {
                cursor.style.transform = 'translate(-50%, -50%) scale(1.6)';
                cursor.style.background = '#ff00ea';
                cursor.style.boxShadow = '0 0 15px #ff00ea, 0 0 30px #ff00ea';
            } else {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                cursor.style.background = '#00f2ff';
                cursor.style.boxShadow = '0 0 15px #00f2ff, 0 0 30px #00f2ff';
            }
        });

        // O'YIN LOGIKASI
        const icons = [
            'fa-robot', 'fa-robot',
            'fa-gamepad', 'fa-gamepad',
            'fa-bolt', 'fa-bolt',
            'fa-skull', 'fa-skull',
            'fa-code', 'fa-code',
            'fa-microchip', 'fa-microchip'
        ];

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let flipCount = 0;
        let matchCount = 0;

        const gameGrid = document.getElementById('game-grid');
        const flipsEl = document.getElementById('flips');
        const scoreEl = document.getElementById('score');
        const restartBtn = document.getElementById('restart-btn');

        // Kartalarni chalkashtirish (Shuffle)
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // O'yin taxtasini yaratish
        function createBoard() {
            gameGrid.innerHTML = '';
            const shuffledIcons = shuffle([...icons]);

            shuffledIcons.forEach(icon => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.icon = icon;

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="w-2 h-2 rounded-full bg-cyan-400/40 animate-pulse"></div>
                        </div>
                        <div class="card-back">
                            <i class="fa-solid ${icon} text-xl text-pink-500"></i>
                        </div>
                    </div>
                `;

                card.addEventListener('click', flipCard);
                gameGrid.appendChild(card);
            });
        }

        // Kartani ochish
        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        // Bir xillikka tekshirish
        function checkForMatch() {
            flipCount++;
            flipsEl.textContent = flipCount;

            let isMatch = firstCard.dataset.icon === secondCard.dataset.icon;
            isMatch ? disableCards() : unflipCards();
        }

        // Agar to'g'ri topilsa
        function disableCards() {
            matchCount++;
            scoreEl.textContent = `${matchCount} / 6`;

            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            // Topilgan kartalarga yashil neon chiroq berish
            firstCard.querySelector('.card-back').style.borderColor = '#22c55e';
            secondCard.querySelector('.card-back').style.borderColor = '#22c55e';
            firstCard.querySelector('.card-back').style.boxShadow = '0 0 15px rgba(34, 197, 94, 0.4)';
            secondCard.querySelector('.card-back').style.boxShadow = '0 0 15px rgba(34, 197, 94, 0.4)';

            resetTurn();

            if (matchCount === 6) {
                setTimeout(() => {
                    alert(`Tabriklayman! O'yinni ${flipCount} ta urinishda tugatdingiz! 🎉`);
                }, 500);
            }
        }

        // Noto'g'ri topilsa, qaytarib yopish
        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetTurn();
            }, 1000);
        }

        function resetTurn() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function resetGame() {
            flipCount = 0;
            matchCount = 0;
            flipsEl.textContent = '0';
            scoreEl.textContent = '0 / 6';
            resetTurn();
            createBoard();
        }

        restartBtn.addEventListener('click', resetGame);

        // O'yinni boshlash
        createBoard();
    </script>
</body>

</html>
