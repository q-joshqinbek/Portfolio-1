<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenBudget - Premium Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- PREMIUM APPS STYLING & GLASSMORPHISM --- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --emerald-prime: #059669;
            --rose-prime: #e11d48;
            --accent-blue: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 50%, #fef3c7 100%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 5rem;
        }

        /* --- SILLIQ KURSOR EFFEKTI --- */
        .cursor-dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-dark);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        .cursor-circle {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease-out, border-color 0.3s;
        }

        body.hovering .cursor-circle {
            border-color: var(--emerald-prime);
            background-color: rgba(5, 150, 105, 0.05);
            transform: translate(-50%, -50%) scale(1.3);
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 6%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--emerald-prime);
        }

        nav ul {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav ul li a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: var(--emerald-prime);
        }

        /* --- MAIN DASHBOARD LAYOUT --- */
        .dashboard-container {
            max-width: 1200px;
            margin: 3rem auto 0 auto;
            padding: 0 4%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2.5rem;
        }

        /* Glassmorphism Card Base */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        /* BALANCE CARDS (TOP RIGHT) */
        .balance-summary-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .mini-stat-card {
            padding: 1.5rem;
            border-radius: 20px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .stat-total {
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .stat-income {
            background: linear-gradient(135deg, #059669, #10b981);
        }

        .stat-expense {
            background: linear-gradient(135deg, #e11d48, #f43f5e);
        }

        .mini-stat-card h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }

        .mini-stat-card .amount {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* FORMS & INPUTS */
        .form-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .input-wrapper {
            margin-bottom: 1.2rem;
        }

        .input-wrapper label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .premium-input,
        .premium-select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.6);
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-dark);
            transition: all 0.3s;
        }

        .premium-input:focus,
        .premium-select:focus {
            border-color: var(--emerald-prime);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--text-dark);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: var(--emerald-prime);
            box-shadow: 0 10px 20px rgba(5, 150, 105, 0.2);
        }

        /* TRANSACTION LIST */
        .tx-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .tx-table-container {
            max-height: 400px;
            overflow-y: auto;
        }

        .tx-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            margin-bottom: 0.8rem;
            transition: transform 0.2s, background 0.2s;
            animation: fadeInRow 0.4s ease-out forwards;
        }

        .tx-row:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.7);
        }

        .tx-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .tx-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .tx-icon.inc {
            background: rgba(5, 150, 105, 0.1);
            color: var(--emerald-prime);
        }

        .tx-icon.exp {
            background: rgba(225, 29, 72, 0.1);
            color: var(--rose-prime);
        }

        .tx-details h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .tx-details p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .tx-amount-box {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .tx-amount {
            font-weight: 700;
            font-size: 1rem;
        }

        .tx-amount.inc {
            color: var(--emerald-prime);
        }

        .tx-amount.exp {
            color: var(--rose-prime);
        }

        .delete-tx-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            transition: color 0.2s;
        }

        .delete-tx-btn:hover {
            color: var(--rose-prime);
        }

        @keyframes fadeInRow {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* SCREEN RESPONSIVENESS */
        @media (max-width: 992px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .balance-summary-box {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="cursor-dot"></div>
    <div class="cursor-circle"></div>

    <header>
        <div class="logo">Zen<span>Budget</span></div>
        <nav>
            <ul>
                <li><a href="index.html">Bosh Sahifa</a></li>
                <li><a href="Khiva.html">Khiva</a></li>
                <li><a href="bukhara-stars.html">Bukhara Stars</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-container">

        <section class="glass-card">
            <h2 class="form-title">Yangi operatsiya</h2>
            <form id="budgetForm">
                <div class="input-wrapper">
                    <label for="txType">Turi</label>
                    <select id="txType" class="premium-select">
                        <option value="income">Daromad (+)</option>
                        <option value="expense">Xarajat (-)</option>
                    </select>
                </div>
                <div class="input-wrapper">
                    <label for="txTitle">Tavsif (Nomi)</label>
                    <input type="text" id="txTitle" class="premium-input"
                        placeholder="Masalan: Oylik maosh, Restoran..." required>
                </div>
                <div class="input-wrapper">
                    <label for="txAmount">Mablag' (So'm)</label>
                    <input type="number" id="txAmount" class="premium-input" placeholder="Summani kiriting..." required>
                </div>
                <button type="submit" class="submit-btn">Tizimga kiritish</button>
            </form>
        </section>

        <section style="display: flex; flex-direction: column; gap: 2rem;">

            <div class="balance-summary-box">
                <div class="mini-stat-card stat-total">
                    <h3>Sof Balans</h3>
                    <div class="amount" id="totalBalance">0 so'm</div>
                </div>
                <div class="mini-stat-card stat-income">
                    <h3>Daromadlar</h3>
                    <div class="amount" id="totalIncome">0 so'm</div>
                </div>
                <div class="mini-stat-card stat-expense">
                    <h3>Xarajatlar</h3>
                    <div class="amount" id="totalExpense">0 so'm</div>
                </div>
            </div>

            <div class="glass-card" style="flex: 1;">
                <div class="tx-list-header">
                    <h2 class="form-title" style="margin-bottom: 0;">Moliyaviy ko'chirma</h2>
                    <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;" id="txCount">0 ta
                        operatsiya</span>
                </div>

                <div class="tx-table-container" id="txContainer">
                </div>
            </div>

        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function () {
            // Silliq premium kursor harakati
            const dot = $('.cursor-dot');
            const circle = $('.cursor-circle');

            $(document).on('mousemove', function (e) {
                dot.css({ left: e.clientX + 'px', top: e.clientY + 'px' });
                circle.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 400, fill: "forwards" });
            });

            // Hover elementlariga reaksiya bildirish
            function initHoverEffects() {
                $('a, button, input, select, .delete-tx-btn').off('mouseenter mouseleave').hover(
                    function () { $('body').addClass('hovering'); },
                    function () { $('body').removeClass('hovering'); }
                );
            }
            initHoverEffects();

            // LOCALSTORAGE BILAN ISHLASH MANTIQLARI (MOLIYA DATABASI)
            let transactions = JSON.parse(localStorage.getItem('zenTransactions')) || [];

            function formatMoney(num) {
                return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " so'm";
            }

            function updateUI() {
                let income = 0;
                let expense = 0;
                $('#txContainer').html('');

                if (transactions.length === 0) {
                    $('#txContainer').html('<p style="color: #64748b; text-align:center; margin-top:3rem; font-size:0.9rem;">Hozircha moliyaviy harakatlar mavjud emas.</p>');
                } else {
                    transactions.forEach((tx, index) => {
                        let isInc = tx.type === 'income';
                        if (isInc) income += tx.amount; else expense += tx.amount;

                        let rowHTML = `
                            <div class="tx-row">
                                <div class="tx-info">
                                    <div class="tx-icon ${isInc ? 'inc' : 'exp'}">
                                        <i class="fa-solid ${isInc ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i>
                                    </div>
                                    <div class="tx-details">
                                        <h4>${tx.title}</h4>
                                        <p>${tx.date}</p>
                                    </div>
                                </div>
                                <div class="tx-amount-box">
                                    <span class="tx-amount ${isInc ? 'inc' : 'exp'}">${isInc ? '+' : '-'}${formatMoney(tx.amount)}</span>
                                    <button class="delete-tx-btn" data-index="${index}"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </div>
                        `;
                        $('#txContainer').prepend(rowHTML);
                    });
                }

                let balance = income - expense;
                $('#totalBalance').text(formatMoney(balance));
                $('#totalIncome').text(formatMoney(income));
                $('#totalExpense').text(formatMoney(expense));
                $('#txCount').text(transactions.length + " ta operatsiya");

                initHoverEffects();
            }

            // YANGI OPERATSIYA QO'SHISH
            $('#budgetForm').on('submit', function (e) {
                e.preventDefault();

                let type = $('#txType').val();
                let title = $('#txTitle').val().trim();
                let amount = parseFloat($('#txAmount').val());
                let now = new Date();
                let dateStr = now.getDate() + '.' + (now.getMonth() + 1) + '.' + now.getFullYear() + ' ' + now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

                let newTx = { type, title, amount, date: dateStr };
                transactions.push(newTx);
                localStorage.setItem('zenTransactions', JSON.stringify(transactions));

                // Formani tozalash va UI yangilash
                $('#txTitle').val('');
                $('#txAmount').val('');
                updateUI();
            });

            // OPERATSIYANI O'CHIRISH (Dinamik tugma bo'lgani uchun delegatsiya qilingan)
            $('#txContainer').on('click', '.delete-tx-btn', function () {
                let targetIndex = $(this).data('index');

                // Elementni chiroyli olib tashlash effekti
                $(this).closest('.tx-row').slideUp(300, function () {
                    transactions.splice(targetIndex, 1);
                    localStorage.setItem('zenTransactions', JSON.stringify(transactions));
                    updateUI();
                });
            });

            // Ilovani birinchi marta yuklash
            updateUI();
        });
    </script>
</body>

</html>
