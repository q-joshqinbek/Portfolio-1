<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQ Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --n-blue: #00f2ff;
            --n-pink: #ff00ea;
            --bg: #050505;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        /* Navbar va Bosh sahifaga qaytish tugmasi stili */
        .navbar {
            padding: 15px 20px;
            display: flex;
            justify-content: flex-start;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .back-home-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--n-pink);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid var(--n-pink);
            border-radius: 6px;
            text-shadow: 0 0 5px var(--n-pink);
            box-shadow: 0 0 10px rgba(255, 0, 234, 0.2), inset 0 0 5px rgba(255, 0, 234, 0.1);
            transition: all 0.3s ease-in-out;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
        }

        .back-home-btn:hover {
            color: #fff;
            background: var(--n-pink);
            box-shadow: 0 0 20px var(--n-pink), 0 0 40px var(--n-pink);
            text-shadow: 0 0 8px #fff;
            transform: translateX(-3px);
        }

        header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid var(--n-blue);
            box-shadow: 0 0 15px var(--n-blue);
            background: rgba(0, 0, 0, 0.8);
        }

        header h1 {
            font-family: 'Orbitron';
            color: var(--n-blue);
            text-shadow: 0 0 10px var(--n-blue);
            margin: 0;
            font-size: 1.8rem;
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            opacity: 0.8;
            color: var(--n-blue);
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.25);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            /* Telefon ekranlari uchun moslashuvchan kenglik */
            max-width: 340px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: 0.4s;
            box-sizing: border-box;
        }

        .card:hover {
            border-color: var(--n-pink);
            box-shadow: 0 0 25px rgba(255, 0, 234, 0.4);
            transform: translateY(-5px);
        }

        .card h2 {
            font-family: 'Orbitron';
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        #calc-disp {
            width: 100%;
            box-sizing: border-box;
            height: 60px;
            background: #000;
            border: 1px solid var(--n-blue);
            color: var(--n-blue);
            font-family: 'Orbitron';
            text-align: right;
            padding: 10px 15px;
            font-size: 1.8rem;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .c-btn {
            height: 55px; /* Telefonlarda bosish oson bo'lishi uchun biroz kattalashtirildi */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: white;
            font-family: 'Orbitron';
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.25s ease;
            -webkit-tap-highlight-color: transparent; /* Mobil ekranda bosgandagi ko'k soyani yo'qotadi */
        }

        .c-btn:hover {
            background: var(--n-blue);
            color: #000;
            box-shadow: 0 0 15px var(--n-blue);
            border-color: var(--n-blue);
        }

        .c-btn.btn-equal {
            background: var(--n-pink);
            border-color: var(--n-pink);
        }

        .c-btn.btn-equal:hover {
            background: #ff40f0;
            color: white;
            box-shadow: 0 0 15px var(--n-pink);
            border-color: #ff40f0;
        }

        .c-btn.btn-clear {
            color: #ff3333;
            border-color: rgba(255, 51, 51, 0.4);
        }

        .c-btn.btn-clear:hover {
            background: #ff3333;
            color: white;
            box-shadow: 0 0 15px #ff3333;
            border-color: #ff3333;
        }

        /* Mobil qurilmalar uchun moslashtirish (Ekran 400px dan kichik bo'lganda) */
        @media (max-width: 400px) {
            .card {
                padding: 15px;
            }
            .calc-grid {
                gap: 8px;
            }
            .c-btn {
                height: 50px;
                font-size: 1.1rem;
            }
            #calc-disp {
                font-size: 1.5rem;
                height: 55px;
            }
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>

    <div class="navbar">
        <a href="index.html" class="back-home-btn">« BOSH SAHIFAGA QAYTISH</a>
    </div>

    <header>
        <h1>Kalkulyator</h1>
        <p>Oson va tez hisoblash vositasi</p>
    </header>

    <div class="main-container">
        <div class="card">
            <h2>Neon Calculator</h2>
            <input type="text" id="calc-disp" disabled placeholder="0">
            <div class="calc-grid">
                <button class="c-btn" onclick="cInp('7')">7</button>
                <button class="c-btn" onclick="cInp('8')">8</button>
                <button class="c-btn" onclick="cInp('9')">9</button>
                <button class="c-btn" onclick="cInp('/')">/</button>

                <button class="c-btn" onclick="cInp('4')">4</button>
                <button class="c-btn" onclick="cInp('5')">5</button>
                <button class="c-btn" onclick="cInp('6')">6</button>
                <button class="c-btn" onclick="cInp('*')">*</button>

                <button class="c-btn" onclick="cInp('1')">1</button>
                <button class="c-btn" onclick="cInp('2')">2</button>
                <button class="c-btn" onclick="cInp('3')">3</button>
                <button class="c-btn" onclick="cInp('-')">-</button>

                <button class="c-btn btn-clear" onclick="cClr()">C</button>
                <button class="c-btn" onclick="cInp('0')">0</button>
                <button class="c-btn btn-equal" onclick="cRes()">=</button>
                <button class="c-btn" onclick="cInp('+')">+</button>
            </div>
        </div>
    </div>

    <script>
        // Matrix Effect
        const c = document.getElementById('matrix');
        const ctx = c.getContext('2d');

        function resizeMatrix() {
            c.width = window.innerWidth;
            c.height = window.innerHeight;
        }
        resizeMatrix();
        window.addEventListener('resize', resizeMatrix);

        const drops = Array(Math.floor(c.width / 16)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.1)";
            ctx.fillRect(0, 0, c.width, c.height);
            ctx.fillStyle = "#00f2ff";
            ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText("01"[Math.floor(Math.random() * 2)], i * 16, y * 16);
                if (y * 16 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 40);

        // Calc Logic
        const d = document.getElementById('calc-disp');
        function cInp(v) { d.value += v; }
        function cClr() { d.value = ""; }
        function cRes() { try { d.value = eval(d.value); } catch { d.value = "Error"; } }

        // Klaviaturadan kiritish funksiyasi
        window.addEventListener('keydown', function(event) {
            const key = event.key;
            if ('0123456789+-*/'.includes(key)) {
                cInp(key);
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                cRes();
            } else if (key === 'Escape') {
                cClr();
            } else if (key === 'Backspace') {
                d.value = d.value.toString().slice(0, -1);
            }
        });
    </script>
</body>

</html>
