<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Analog Clock | JQ Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #050b14;
            cursor: none;
            /* Standart kursor yashiriladi */
        }

        a,
        button,
        .clock-circle {
            cursor: none;
            /* Barcha elementlarda ham kursor ko'rinmaydi */
        }

        .cyber-font {
            font-family: 'Orbitron', sans-serif;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }

        /* MAXSUS NEON KURSORLAR */
        .custom-cursor {
            width: 8px;
            height: 8px;
            background: #00f2ff;
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
            transition: width 0.1s, height 0.1s;
        }

        .custom-cursor-follower {
            width: 24px;
            height: 24px;
            border: 2px solid #ff00ea;
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9998;
            box-shadow: 0 0 12px rgba(255, 0, 234, 0.4);
            /* Inertsiya (orqada qolib ergashish) effekti */
            transition: transform 0.08s ease-out;
        }

        /* SOAT AYLANASI VA NEON STYLLAR */
        .clock-circle {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.4);
            border: 4px solid rgba(6, 182, 212, 0.4);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.2), inset 0 0 30px rgba(0, 0, 0, 0.8);
        }

        /* Raqamlar joylashuvi */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            transform-origin: center;
            padding: 14px;
            /* Raqamlar markazga yaqinroq bo'lishi uchun o'zgartirildi */
            font-size: 1.15rem;
            font-weight: 700;
            color: #94a3b8;
        }

        /* STRELKALAR */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            transform: translateX(-50%) rotate(0deg);
        }

        .hour-hand {
            width: 6px;
            height: 70px;
            background: #ffffff;
            box-shadow: 0 0 10px #ffffff;
            z-index: 3;
        }

        .min-hand {
            width: 4px;
            height: 100px;
            background: #06b6d4;
            box-shadow: 0 0 12px #06b6d4;
            z-index: 4;
        }

        .sec-hand {
            width: 2px;
            height: 120px;
            background: #ec4899;
            box-shadow: 0 0 15px #ec4899;
            z-index: 5;
        }

        /* Soat markazidagi nuqta */
        .center-nut {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 10px #ffffff;
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen flex flex-col justify-between relative select-none overflow-hidden">

    <div id="cursor" class="custom-cursor"></div>
    <div id="cursorFollower" class="custom-cursor-follower"></div>

    <canvas id="bg-canvas"></canvas>

    <div class="max-w-6xl w-full mx-auto px-6 pt-8 relative z-10">
        <a href="projects.html"
            class="hover-target inline-flex items-center gap-3 text-sm font-semibold text-sky-400 bg-slate-900/60 border border-sky-500/30 rounded-xl px-5 py-3 transition-all duration-300 hover:border-sky-400 hover:text-white hover:bg-sky-500/10 hover:shadow-[0_0_20px_rgba(14,165,233,0.3)] group backdrop-blur-sm">
            <div
                class="w-6 h-6 rounded-lg bg-sky-500/10 flex items-center justify-center transition-transform group-hover:-translate-x-1 border border-sky-500/20">
                <i class="fa-solid fa-chevron-left text-xs"></i>
            </div>
            <span class="tracking-wide uppercase text-xs font-bold cyber-font">Loyihalarga qaytish</span>
        </a>
    </div>

    <main class="max-w-xl w-full mx-auto px-6 py-8 flex-grow flex flex-col items-center justify-center relative z-10">

        <div
            class="bg-slate-800/10 border border-slate-700/30 p-8 rounded-3xl backdrop-blur-md shadow-2xl relative flex flex-col items-center">

            <div class="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-pink-500"></div>
            <div class="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-cyan-500"></div>
            <div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-cyan-500"></div>
            <div class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-pink-500"></div>

            <div class="text-center mb-6">
                <p id="digitalDate" class="text-xs tracking-widest text-cyan-400 font-bold cyber-font uppercase mb-1">
                    LOADING...</p>
                <p id="digitalDay" class="text-sm font-semibold text-slate-400 uppercase tracking-wide"></p>
            </div>

            <div class="clock-circle mb-6">
                <div class="center-nut"></div>

                <div id="hourHand" class="hand hour-hand"></div>
                <div id="minHand" class="hand min-hand"></div>
                <div id="secHand" class="hand sec-hand"></div>

                <div class="number cyber-font" style="transform: rotate(30deg);"><span class="inline-block"
                        style="transform: rotate(-30deg);">1</span></div>
                <div class="number cyber-font" style="transform: rotate(60deg);"><span class="inline-block"
                        style="transform: rotate(-60deg);">2</span></div>
                <div class="number cyber-font"
                    style="transform: rotate(90deg); text-shadow: 0 0 8px #06b6d4; color: #06b6d4;"><span
                        class="inline-block" style="transform: rotate(-90deg);">3</span></div>
                <div class="number cyber-font" style="transform: rotate(120deg);"><span class="inline-block"
                        style="transform: rotate(-120deg);">4</span></div>
                <div class="number cyber-font" style="transform: rotate(150deg);"><span class="inline-block"
                        style="transform: rotate(-150deg);">5</span></div>
                <div class="number cyber-font"
                    style="transform: rotate(180deg); text-shadow: 0 0 8px #ec4899; color: #ec4899;"><span
                        class="inline-block" style="transform: rotate(-180deg);">6</span></div>
                <div class="number cyber-font" style="transform: rotate(210deg);"><span class="inline-block"
                        style="transform: rotate(-210deg);">7</span></div>
                <div class="number cyber-font" style="transform: rotate(240deg);"><span class="inline-block"
                        style="transform: rotate(-240deg);">8</span></div>
                <div class="number cyber-font"
                    style="transform: rotate(270deg); text-shadow: 0 0 8px #06b6d4; color: #06b6d4;"><span
                        class="inline-block" style="transform: rotate(-270deg);">9</span></div>
                <div class="number cyber-font" style="transform: rotate(300deg);"><span class="inline-block"
                        style="transform: rotate(-300deg);">10</span></div>
                <div class="number cyber-font" style="transform: rotate(330deg);"><span class="inline-block"
                        style="transform: rotate(-330deg);">11</span></div>
                <div class="number cyber-font"
                    style="transform: rotate(0deg); text-shadow: 0 0 10px #ffffff; color: #fff;"><span
                        class="inline-block" style="transform: rotate(0deg);">12</span></div>
            </div>

            <div class="bg-slate-950/80 border border-slate-800 px-4 py-2 rounded-xl">
                <p id="digitalTime" class="text-lg font-bold text-slate-300 cyber-font tracking-widest"></p>
            </div>
        </div>

    </main>

    <footer class="border-t border-slate-800/80 py-6 text-center text-xs text-slate-500 relative z-10">
        <div class="max-w-6xl mx-auto px-6 cyber-font">
            &copy; 2026 JQ Portfolio. Analog Chrono Core.
        </div>
    </footer>

    <script>
        // SICHQONCHA KURSORI KODLARI
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursorFollower');
        const hoverTargets = document.querySelectorAll('.hover-target, .clock-circle, font');

        document.addEventListener('mousemove', (e) => {
            // Asosiy kursor nuqtasi darhol harakatlanadi
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            // Ergashuvchi tashqi aylana (Inertsiya bilan siljiydi)
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        // Biror tugmaga yaqinlashganda kursorning reaksiyasi (Kattalashishi)
        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', () => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
                cursor.style.background = '#ff00ea';
                follower.style.width = '40px';
                follower.style.height = '40px';
                follower.style.borderColor = '#00f2ff';
            });
            target.addEventListener('mouseleave', () => {
                cursor.style.width = '8px';
                cursor.style.height = '8px';
                cursor.style.background = '#00f2ff';
                follower.style.width = '24px';
                follower.style.height = '24px';
                follower.style.borderColor = '#ff00ea';
            });
        });


        // ANALOG SOAT MANTIQI
        const hourHand = document.getElementById('hourHand');
        const minHand = document.getElementById('minHand');
        const secHand = document.getElementById('secHand');
        const digitalTime = document.getElementById('digitalTime');
        const digitalDate = document.getElementById('digitalDate');
        const digitalDay = document.getElementById('digitalDay');

        const oylar = ["Yanvar", "Fevral", "Mart", "Aprel", "May", "Iyun", "Iyul", "Avgust", "Sentabr", "Oktabr", "Noyabr", "Dekabr"];
        const kunlar = ["Yakshanba", "Dushanba", "Seshanba", "Chorshanba", "Payshanba", "Juma", "Shanba"];

        function runClock() {
            const now = new Date();
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            const secDegrees = (seconds * 6);
            const minDegrees = (minutes * 6) + (seconds * 0.1);
            const hourDegrees = (hours * 30) + (minutes * 0.5);

            secHand.style.transform = `translateX(-50%) rotate(${secDegrees}deg)`;
            minHand.style.transform = `translateX(-50%) rotate(${minDegrees}deg)`;
            hourHand.style.transform = `translateX(-50%) rotate(${hourDegrees}deg)`;

            let dH = hours < 10 ? '0' + hours : hours;
            let dM = minutes < 10 ? '0' + minutes : minutes;
            let dS = seconds < 10 ? '0' + seconds : seconds;
            digitalTime.textContent = `${dH}:${dM}:${dS}`;

            if (seconds === 0 || digitalDate.textContent === "LOADING...") {
                digitalDate.textContent = `${now.getDate()}-${oylar[now.getMonth()]}, ${now.getFullYear()}`;
                digitalDay.textContent = kunlar[now.getDay()];
            }
        }
        setInterval(runClock, 1000);
        runClock();


        // BACKGROUND PARTICLE EFFECT (Zarrachalar foni)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const colors = ['#00f2ff', '#ff00ea', '#38bdf8', '#ffffff'];
        const mouse = { x: null, y: null };

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            for (let i = 0; i < 2; i++) particlesArray.push(new Particle());
        });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.x = mouse.x || Math.random() * canvas.width;
                this.y = mouse.y || Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1.5 - 0.75;
                this.speedY = Math.random() * 1.5 - 0.75;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.size > 0.1) this.size -= 0.02; }
            draw() { ctx.fillStyle = this.color; ctx.shadowBlur = 8; ctx.shadowColor = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }

        function initParticles() { if (particlesArray.length < 40) { mouse.x = Math.random() * canvas.width; mouse.y = Math.random() * canvas.height; particlesArray.push(new Particle()); mouse.x = null; mouse.y = null; } }
        function animate() { ctx.fillStyle = "rgba(5, 11, 20, 0.12)"; ctx.fillRect(0, 0, canvas.width, canvas.height); initParticles(); handleParticles(); ctx.shadowBlur = 0; connectParticles(); requestAnimationFrame(animate); }
        function handleParticles() { for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); if (particlesArray[i].size <= 0.3) { particlesArray.splice(i, 1); i--; } } }
        function connectParticles() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x; let dy = particlesArray[a].y - particlesArray[b].y; let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 80) { let op = 1 - (dist / 80); ctx.strokeStyle = `rgba(56, 189, 248, ${op * 0.2})`; ctx.lineWidth = 0.8; ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke(); }
                }
            }
        }
        animate();
    </script>
</body>

</html>
